<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sibling-index() Example</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            color-scheme: light dark;
        }

        .wrapper {
            display: grid;
            place-items: center;
            min-block-size: 100vh;
            font-family: system-ui;

            ul {
                list-style-type: none;
                margin: 0;
                display: grid;
                gap: .5rem;
                grid-template-columns: 1fr;
                justify-content: center;
                align-items: center;
                padding: 0;
                li {
                    /* z-index: calc(sibling-count() - sibling-index()); */
                    /* transition: z-index 150ms ease; */
                    position: relative;
                    transition: left 300ms ease, opacity 300ms ease;
                    transition-delay: calc(sibling-index() * 100ms);
                    /* Without sibling-index() */
                    /* &:nth-child(2) {
                        transition-delay: 200ms;
                    }
                    &:nth-child(3) {
                        transition-delay: 300ms;
                    }
                    &:nth-child(4) {
                        transition-delay: 400ms;
                    } */
                    &:has(a:hover) {
                        /* z-index: sibling-count(); */
                    }
                    &:not(:first-child) {
                        left: 100%;
                        opacity: 0;
                    }
                    &:hover {
                        ~ li {
                            left: 0;
                            opacity: 1;
                        }
                    }
                    a {
                        display: block;
                        background: #fff;
                        color: #000;
                        text-decoration: none;
                        padding: 1rem 3rem;
                        transition: background 300ms ease;
                        box-shadow: 0 1rem 1rem rgb(0 0 0 / .5);
                        &:hover {
                            background: cornflowerblue;
                        }
                    }
                }
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <ul>
            <li><a href="#">Link One</a></li>
            <li><a href="#">Link Two</a></li>
            <li><a href="#">Link Three</a></li>
            <li><a href="#">Link Four</a></li>
        </ul>
    </div>
</body>

</html>
